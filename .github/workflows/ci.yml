name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: lint + tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.11 is the requires-python floor; 3.13 matches the maintainer's dev env.
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        # The test suite imports numpy/pandas/duckdb/pyarrow/qrcode. The network data
        # adapters (akshare/tushare/baostock) are NOT imported by tests, so we skip them
        # to keep CI fast and non-flaky. Imports resolve via repo root on sys.path
        # (the code is imported as `src.app.*`, matching `pythonpath = ["."]`).
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas duckdb pyarrow "qrcode[pil]" ruff

      - name: Ruff (lint)
        run: ruff check src tests

      - name: Unit tests
        run: python -m unittest discover -s tests -v
